services:
  backend:
    build:
      context: ./backend
    container_name: carbon-arc-tasks-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 3001 --reload
    ports:
      - "3001:3001"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: carbon-arc-tasks-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: "http://localhost:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
